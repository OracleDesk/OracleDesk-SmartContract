[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "prague"

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/"
]

[rpc_endpoints]
arc_testnet = "${RPC}"   # pulls from your .env automatically

[etherscan]
arc_testnet = { key = "placeholder", url = "https://testnet.arcscan.app/api" }